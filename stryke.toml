[package]
name = "stryke-parquet"
version = "0.2.0"
description = "Parquet file inspector / transform cdylib for stryke. Schema, footer stats, row-group breakdown, head/tail, JSON/CSV conversion, recompression. Dlopened in-process via stryke's FFI bridge."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-parquet"
edition = "2026"

[ffi]
lib-name = "stryke_parquet"
namespace = "Parquet"
exports = [
    "parquet__version",
    "parquet__inspect",
    "parquet__schema",
    "parquet__count",
    "parquet__rowgroups",
    "parquet__stats",
    "parquet__head",
    "parquet__tail",
    "parquet__to_json",
    "parquet__to_csv",
    "parquet__compress",
    "parquet__mkdemo",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
