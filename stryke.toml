[package]
name = "stryke-parquet"
version = "0.19.0"
description = "Parquet file inspector / transform cdylib for stryke. Schema, footer stats, row-group breakdown, head/tail, JSON/CSV conversion, recompression. Dlopened in-process via stryke's FFI bridge."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-parquet"
edition = "2026"

[ffi]
lib-name = "stryke_parquet"
namespace = "Parquet"
exports = [
    "parquet__version",
    "parquet__inspect",
    "parquet__schema",
    "parquet__count",
    "parquet__rowgroups",
    "parquet__row_group_summary",
    "parquet__stats",
    "parquet__head",
    "parquet__tail",
    "parquet__reverse",
    "parquet__gather",
    "parquet__top_k",
    "parquet__value_counts",
    "parquet__slice",
    "parquet__to_json",
    "parquet__to_csv",
    "parquet__compress",
    "parquet__from_csv",
    "parquet__from_json",
    "parquet__merge",
    "parquet__hstack",
    "parquet__select",
    "parquet__drop",
    "parquet__rename",
    "parquet__write",
    "parquet__write_partitioned",
    "parquet__metadata",
    "parquet__mkdemo",
    "parquet__validate",
    "parquet__column_chunk_stats",
    "parquet__size_report",
    "parquet__null_summary",
    "parquet__encoding_summary",
    "parquet__bloom_filter_summary",
    "parquet__sorting_columns_summary",
    "parquet__sample",
    "parquet__features",
    "parquet__filter",
    "parquet__where_count",
    "parquet__filter_to",
    "parquet__distinct",
    "parquet__sort",
    "parquet__column",
    "parquet__sum",
    "parquet__describe",
    "parquet__group_by",
    "parquet__random_sample",
    "parquet__to_ndjson",
    "parquet__repartition",
    "parquet__dtypes",
    "parquet__min",
    "parquet__max",
    "parquet__mean",
    "parquet__n_unique",
    "parquet__quantile",
    "parquet__with_row_index",
    "parquet__schema_diff",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
